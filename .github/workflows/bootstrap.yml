# One-shot: publishes the package, then configure Trusted Publishing on npmjs.com
# Delete this workflow after the first publish.
# See https://github.com/azu/setup-npm-trusted-publish

name: Bootstrap (first publish)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
